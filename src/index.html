<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8"/>
        <link rel="stylesheet" href="styles.css"/>
        <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
        <title>Swarm FM</title>
        <script type="module" src="/script.js"></script>
    </head>
    <body>
        <div data-tauri-drag-region class="titlebar">
            <div class="titlebar-button" id="titlebar-autostart" title="Auto Start">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewbox="0 0 24 24">
                    <path fill="currentColor" d="m16.56 5.44l-1.45 1.45A5.97 5.97 0 0 1 18 12a6 6 0 0 1-6 6a6 6 0 0 1-6-6c0-2.17 1.16-4.06 2.88-5.12L7.44 5.44A7.96 7.96 0 0 0 4 12a8 8 0 0 0 8 8a8 8 0 0 0 8-8c0-2.72-1.36-5.12-3.44-6.56M13 3h-2v10h2"/>
                </svg>
            </div>
            <div class="titlebar-button" id="titlebar-mute" title="Mute">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewbox="0 0 16 16">
                    <path fill="currentColor" d="M11.243 12.993a.75.75 0 0 1-.53-1.281a5.256 5.256 0 0 0 0-7.425a.75.75 0 1 1 1.061-1.061c1.275 1.275 1.977 2.97 1.977 4.773s-.702 3.498-1.977 4.773a.75.75 0 0 1-.53.22zm-2.665-1.415a.75.75 0 0 1-.53-1.281a3.254 3.254 0 0 0 0-4.596a.75.75 0 1 1 1.061-1.061a4.756 4.756 0 0 1 0 6.718a.75.75 0 0 1-.53.22zM6.5 15a.5.5 0 0 1-.354-.146L2.292 11H.499a.5.5 0 0 1-.5-.5v-5a.5.5 0 0 1 .5-.5h1.793l3.854-3.854A.499.499 0 0 1 7 1.5v13a.5.5 0 0 1-.5.5"/>
                </svg>
            </div>
            <div class="titlebar-button" id="titlebar-pintotop" title="Pin to Top">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewbox="0 0 24 24">
                    <path fill="currentColor" d="M16 12V4h1V2H7v2h1v8l-2 2v2h5.2v6h1.6v-6H18v-2z"/>
                </svg>
            </div>
            <div class="titlebar-button" id="titlebar-minimize" title="Minimize">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewbox="0 0 24 24">
                    <path fill="currentColor" d="M19 13H5v-2h14z"/>
                </svg>
            </div>
            <div class="titlebar-button" id="titlebar-close" title="Close">
                <svg xmlns="http://www.w3.org/2000/svg" width="1em" height="1em" viewbox="0 0 24 24">
                    <path fill="currentColor" d="M19 6.41L17.59 5L12 10.59L6.41 5L5 6.41L10.59 12L5 17.59L6.41 19L12 13.41L17.59 19L19 17.59L13.41 12z"/>
                </svg>
            </div>
        </div>
        <div id="player"></div>
        <script src="/script.js"></script>
    <script>
      const fetch2 = window.__TAURI__.http.fetch;
      var tempdata = null;
      var player;
      async function fetchData() {
        //var data = null
          try {
              const response = await fetch2('https://sw.arm.fm/api/livestream', {cache: "no-store"});
              if (!response.ok) {
                  throw new Error('Network response was not ok');
              }
              const responseData = await response.text();
              tempdata = JSON.parse(responseData);
              console.log(tempdata);
          } catch (error) {
              console.error('Error fetching livestream data:', error);

              try {
                  const fallbackResponse = await fetch2('https://uptime.sw.arm.fm/', {cache: "no-store"});
                  if (!fallbackResponse.ok) {
                      throw new Error('Network response was not ok');
                  }
                  const fallbackData = await fallbackResponse.text();
                  tempdata = JSON.parse(fallbackData);
                  console.log(tempdata);
              } catch (fallbackError) {
                  console.error('Error fetching fallback data:', fallbackError);
              }
          }
          const data = tempdata;
          console.log(data);
          initializePlayer(data);
      }

      function initializePlayer(data) {
          var tag = document.createElement("script");
          tag.src = "https://www.youtube.com/iframe_api";
          var firstScriptTag = document.getElementsByTagName("script")[0];
          firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
          var player;

          function onYouTubeIframeAPIReady() {
              if (data["rawVideoCode"]) {
                  data = data["rawVideoCode"];
              } else if (data["videoId"]) {
                  data = data["videoId"];
              } else {
                  throw new Error("No videoId found");
              }
              console.log(data);
              const videoId = data;
              player = new YT.Player('player', {
                  height: '100%',
                  width: '100%',
                  videoId: videoId,
                  playerVars: {
                      'autoplay': 1,
                      'controls': 0
                  },
                  events: {
                      'onReady': onPlayerReady
                  }
              });
          }

          function onPlayerReady(event) {
              if (localStorage.getItem("muted") === "true") {
                  player.mute();
                  document.getElementById("titlebar-mute").querySelector("path").setAttribute("d", "M15 9.674V11h-1.326L12 9.326L10.326 11H9V9.674L10.674 8L9 6.326V5h1.326L12 6.674L13.674 5H15v1.326L13.326 8zM6.5 15a.5.5 0 0 1-.354-.146L2.292 11H.499a.5.5 0 0 1-.5-.5v-5a.5.5 0 0 1 .5-.5h1.793l3.854-3.854A.499.499 0 0 1 7 1.5v13a.5.5 0 0 1-.5.5");
                  document.getElementById("titlebar-mute").querySelector("path").setAttribute("viewBox", "0 0 512 512");
                  document.getElementById("titlebar-mute").title = "Muted";
              }
              event.target.playVideo();
          }

          window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
      }
      fetchData().then(() => {
        var tag = document.createElement("script");
        tag.src = "https://www.youtube.com/iframe_api";
        var firstScriptTag = document.getElementsByTagName("script")[0];
        firstScriptTag.parentNode.insertBefore(tag, firstScriptTag);
        
        console.log(tempdata);
        function onYouTubeIframeAPIReady() {
          let data = tempdata;
          if (data["rawVideoCode"]) {
            data = data["rawVideoCode"];
          } else if (data["videoId"]) {
            data = data["videoId"];
          } else {
            throw new Error("No videoId found");
          }
          console.log(data);
          const videoId = data;
          player = new YT.Player('player', {
            height: '100%',
            width: '100%',
            videoId: videoId,
            playerVars: {
              'autoplay': 1,
              'controls': 0
            },
            events: {
              'onReady': onPlayerReady
            }
          });
        }

        window.onYouTubeIframeAPIReady = onYouTubeIframeAPIReady;
      });


      function onPlayerReady(event) {
          if (localStorage.getItem("muted") === "true") {
              player.mute();
              document.getElementById("titlebar-mute").querySelector("path").setAttribute("d", "M15 9.674V11h-1.326L12 9.326L10.326 11H9V9.674L10.674 8L9 6.326V5h1.326L12 6.674L13.674 5H15v1.326L13.326 8zM6.5 15a.5.5 0 0 1-.354-.146L2.292 11H.499a.5.5 0 0 1-.5-.5v-5a.5.5 0 0 1 .5-.5h1.793l3.854-3.854A.499.499 0 0 1 7 1.5v13a.5.5 0 0 1-.5.5");
              document.getElementById("titlebar-mute").querySelector("path").setAttribute("viewBox", "0 0 512 512");
              document.getElementById("titlebar-mute").title = "Muted";
          }
          event.target.playVideo();
      }
  </script>
    </body>
</html>
